<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>

    <!-- Deep warm interior background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#100D09"/>
      <stop offset="40%"  stop-color="#0C0A07"/>
      <stop offset="100%" stop-color="#080604"/>
    </linearGradient>

    <!-- Warm amber glow from window -->
    <radialGradient id="windowGlow" cx="54%" cy="44%" r="28%">
      <stop offset="0%"   stop-color="#C8952A" stop-opacity="0.55"/>
      <stop offset="35%"  stop-color="#8B6520" stop-opacity="0.25"/>
      <stop offset="70%"  stop-color="#4A3510" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0C0A07" stop-opacity="0"/>
    </radialGradient>

    <!-- Ambient room light bleed -->
    <radialGradient id="roomGlow" cx="54%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#2A1E0A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#080604" stop-opacity="0"/>
    </radialGradient>

    <!-- Shoji panel light — warm parchment -->
    <linearGradient id="shojiLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#E8C87A" stop-opacity="0.55"/>
      <stop offset="30%"  stop-color="#D4A84A" stop-opacity="0.48"/>
      <stop offset="65%"  stop-color="#B88030" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6A4818" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Garden glow through lower window -->
    <linearGradient id="gardenLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#3A5220" stop-opacity="0.6"/>
      <stop offset="40%"  stop-color="#2A3E18" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0F1A08" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Floor reflection -->
    <linearGradient id="floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1A1208" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#080604" stop-opacity="1"/>
    </linearGradient>

    <!-- Left wall depth -->
    <linearGradient id="leftWall" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#060402" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0C0A07" stop-opacity="0"/>
    </linearGradient>

    <!-- Right side depth -->
    <linearGradient id="rightSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0C0A07" stop-opacity="0"/>
      <stop offset="100%" stop-color="#050403" stop-opacity="1"/>
    </linearGradient>

    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="50%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.65"/>
    </radialGradient>

    <!-- Clip for window area -->
    <clipPath id="windowClip">
      <rect x="640" y="88" width="720" height="750"/>
    </clipPath>

    <!-- Clip for shoji upper panel -->
    <clipPath id="shojiClip">
      <rect x="640" y="88" width="720" height="460"/>
    </clipPath>

    <!-- Clip for garden lower panel -->
    <clipPath id="gardenClip">
      <rect x="640" y="548" width="720" height="290"/>
    </clipPath>

  </defs>

  <!-- Base background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Ambient room warm glow -->
  <rect width="1920" height="1080" fill="url(#roomGlow)"/>

  <!-- Window ambient glow bleeding into the room -->
  <rect width="1920" height="1080" fill="url(#windowGlow)"/>

  <!-- ── FLOOR ──────────────────── -->
  <rect x="0" y="838" width="1920" height="242" fill="url(#floor)"/>

  <!-- Floor highlight strip -->
  <rect x="550" y="838" width="820" height="2" fill="#2A1E0A" opacity="0.6"/>

  <!-- ── WINDOW FRAME ───────────── -->
  <!-- Outer frame shadow -->
  <rect x="632" y="80" width="736" height="766" rx="1" fill="#060402" opacity="0.9"/>

  <!-- Window frame border (dark wood) -->
  <rect x="640" y="88" width="720" height="750" rx="0" fill="#1A1208"/>

  <!-- ── SHOJI SCREEN — upper 60% ── -->
  <!-- Parchment light base -->
  <rect x="648" y="96" width="704" height="452" fill="url(#shojiLight)"/>

  <!-- Shoji horizontal grid lines -->
  <line x1="648" y1="160" x2="1352" y2="160" stroke="#0C0904" stroke-width="2.5" opacity="0.7"/>
  <line x1="648" y1="224" x2="1352" y2="224" stroke="#0C0904" stroke-width="2.5" opacity="0.7"/>
  <line x1="648" y1="288" x2="1352" y2="288" stroke="#0C0904" stroke-width="2.5" opacity="0.7"/>
  <line x1="648" y1="352" x2="1352" y2="352" stroke="#0C0904" stroke-width="2.5" opacity="0.7"/>
  <line x1="648" y1="416" x2="1352" y2="416" stroke="#0C0904" stroke-width="2.5" opacity="0.7"/>
  <line x1="648" y1="480" x2="1352" y2="480" stroke="#0C0904" stroke-width="2.5" opacity="0.7"/>

  <!-- Shoji vertical dividers -->
  <line x1="824"  y1="96" x2="824"  y2="548" stroke="#0C0904" stroke-width="2" opacity="0.6"/>
  <line x1="1000" y1="96" x2="1000" y2="548" stroke="#0C0904" stroke-width="2.5" opacity="0.7"/>
  <line x1="1176" y1="96" x2="1176" y2="548" stroke="#0C0904" stroke-width="2" opacity="0.6"/>

  <!-- Light variation cells — brighter patches suggesting light through screen -->
  <rect x="648"  y="96"  width="176" height="64" fill="#E8D090" opacity="0.08"/>
  <rect x="1000" y="160" width="176" height="64" fill="#EED898" opacity="0.12"/>
  <rect x="824"  y="288" width="176" height="64" fill="#F0DC9A" opacity="0.1"/>
  <rect x="1176" y="96"  width="176" height="128" fill="#ECD494" opacity="0.14"/>
  <rect x="648"  y="352" width="176" height="96"  fill="#E8CC88" opacity="0.07"/>

  <!-- Shoji frame divider (thick horizontal bar separating upper/lower) -->
  <rect x="640" y="544" width="720" height="8" fill="#100C07" opacity="1"/>
  <rect x="640" y="540" width="720" height="4" fill="#1E160A" opacity="0.5"/>

  <!-- ── GARDEN VIEW — lower 40% ── -->
  <rect x="648" y="552" width="704" height="278" fill="url(#gardenLight)"/>

  <!-- Garden silhouette — abstract organic shapes suggesting ferns/moss -->
  <!-- Ground plane -->
  <rect x="648" y="770" width="704" height="60" fill="#0A1206" opacity="0.8"/>

  <!-- Moss/fern shapes — left cluster -->
  <ellipse cx="720"  cy="760" rx="55"  ry="30"  fill="#1A2A10" opacity="0.75"/>
  <ellipse cx="700"  cy="745" rx="35"  ry="22"  fill="#223516" opacity="0.7"/>
  <ellipse cx="760"  cy="750" rx="45"  ry="25"  fill="#1E3012" opacity="0.65"/>
  <ellipse cx="690"  cy="730" rx="25"  ry="18"  fill="#2A3E1A" opacity="0.6"/>

  <!-- Fern cluster — center left -->
  <ellipse cx="840"  cy="770" rx="65"  ry="28"  fill="#1C2C10" opacity="0.8"/>
  <ellipse cx="820"  cy="750" rx="40"  ry="22"  fill="#243618" opacity="0.7"/>
  <ellipse cx="870"  cy="745" rx="50"  ry="20"  fill="#1E3014" opacity="0.65"/>

  <!-- Stone suggestion -->
  <ellipse cx="940"  cy="790" rx="30"  ry="16"  fill="#1A1810" opacity="0.7"/>
  <ellipse cx="985"  cy="784" rx="22"  ry="12"  fill="#16140C" opacity="0.65"/>

  <!-- Fern cluster — center -->
  <ellipse cx="1000" cy="760" rx="60"  ry="26"  fill="#1C2E0E" opacity="0.78"/>
  <ellipse cx="1040" cy="748" rx="45"  ry="20"  fill="#243A14" opacity="0.7"/>
  <ellipse cx="970"  cy="752" rx="38"  ry="18"  fill="#1E3010" opacity="0.65"/>

  <!-- Fern cluster — right -->
  <ellipse cx="1140" cy="765" rx="58"  ry="27"  fill="#1A2C10" opacity="0.75"/>
  <ellipse cx="1170" cy="750" rx="42"  ry="21"  fill="#223614" opacity="0.68"/>
  <ellipse cx="1110" cy="756" rx="35"  ry="18"  fill="#1C2E0C" opacity="0.62"/>

  <!-- Right cluster -->
  <ellipse cx="1270" cy="770" rx="55"  ry="25"  fill="#182808" opacity="0.7"/>
  <ellipse cx="1300" cy="755" rx="38"  ry="19"  fill="#1E3210" opacity="0.65"/>

  <!-- Tall plant/bamboo suggestion — thin vertical -->
  <rect x="962" y="620" width="3" height="170" fill="#223A12" opacity="0.4" rx="1"/>
  <rect x="980" y="635" width="2" height="155" fill="#1E3410" opacity="0.35" rx="1"/>
  <rect x="995" y="645" width="2" height="145" fill="#243E14" opacity="0.3" rx="1"/>

  <!-- Light reflection on garden floor -->
  <ellipse cx="1000" cy="800" rx="120" ry="15" fill="#3A5A20" opacity="0.18"/>

  <!-- ── WINDOW FRAME DETAIL ─────── -->
  <!-- Inner frame lines (wood detail) -->
  <rect x="640" y="88"  width="8"   height="750" fill="#1A1408" opacity="0.95"/>
  <rect x="1352" y="88" width="8"   height="750" fill="#0E0C06" opacity="0.95"/>
  <rect x="640" y="88"  width="720" height="8"   fill="#1A1408" opacity="0.95"/>
  <rect x="640" y="830" width="720" height="8"   fill="#0E0C06" opacity="0.9"/>

  <!-- Outer frame shadow (depth) -->
  <rect x="636" y="84" width="6"   height="758" fill="#050402" opacity="0.8"/>
  <rect x="1358" y="84" width="6"  height="758" fill="#050402" opacity="0.8"/>
  <rect x="634" y="82" width="726" height="6"   fill="#050402" opacity="0.8"/>
  <rect x="634" y="836" width="726" height="6"  fill="#050402" opacity="0.8"/>

  <!-- ── LEFT WALL INTERIOR ─────── -->
  <!-- Suggests dark interior room space to the left -->
  <rect x="0"   y="0" width="1920" height="1080" fill="url(#leftWall)"/>
  <rect x="0"   y="0" width="1920" height="1080" fill="url(#rightSide)"/>

  <!-- Left side suggestion — a lamp or architectural element -->
  <rect x="120" y="600" width="8"  height="238" fill="#1A1208" opacity="0.6"/>
  <rect x="100" y="596" width="48" height="8"   fill="#1A1208" opacity="0.5"/>
  <!-- Lamp glow -->
  <ellipse cx="144" cy="620" rx="30" ry="20" fill="#C8902A" opacity="0.12"/>
  <ellipse cx="144" cy="630" rx="20" ry="35" fill="#A87020" opacity="0.08"/>

  <!-- ── FOREGROUND TABLE SUGGESTION ─ -->
  <rect x="0"   y="870" width="480" height="12"  fill="#141008" opacity="0.8" rx="1"/>
  <rect x="60"  y="882" width="8"   height="198" fill="#0E0C07" opacity="0.7"/>
  <rect x="380" y="882" width="8"   height="198" fill="#0E0C07" opacity="0.7"/>

  <!-- ── CEILING SUGGESTION ──────── -->
  <rect x="0" y="0" width="1920" height="82" fill="#0A0806" opacity="0.7"/>
  <rect x="0" y="78" width="1920" height="1"  fill="#1A1408" opacity="0.4"/>

  <!-- ── VIGNETTE (final layer) ──── -->
  <rect width="1920" height="1080" fill="url(#vignette)"/>

  <!-- Extra edge darkening -->
  <rect x="0"    y="0" width="200"  height="1080" fill="#000000" opacity="0.35"/>
  <rect x="1720" y="0" width="200"  height="1080" fill="#000000" opacity="0.25"/>
  <rect x="0"    y="0" width="1920" height="80"   fill="#000000" opacity="0.4"/>
  <rect x="0"    y="1000" width="1920" height="80" fill="#000000" opacity="0.5"/>

</svg>
